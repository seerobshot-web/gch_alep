# Netlify site config — set this site's package directory to apps/public-site.
# Netlify's monorepo mode reads this file from the package dir but runs
# build.command from the REPO ROOT (and installs workspace deps itself),
# so no cd and no pnpm install here; publish is repo-root-relative.
[build]
  command = "pnpm turbo run build --filter=@gch/public-site"
  publish = "apps/public-site/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
